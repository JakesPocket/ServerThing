services:
  serverthing:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GHCR_OWNER:-your-gh-user}/serverthing:dev-local
    container_name: serverthing-dev
    ports:
      - "3000:3000"
    env_file:
      - ./.env.dockserver
    environment:
      NODE_ENV: production
      MAKEMKV_SSH_KEY_PATH: /run/secrets/makemkv_ssh_key
    volumes:
      - ./data:/app/data
      - ${MAKEMKV_SSH_KEY_HOST_PATH:-/Volumes/500GB Drive/Users/me/.ssh/makemkv_dev_arm}:/run/secrets/makemkv_ssh_key:ro
    restart: unless-stopped
