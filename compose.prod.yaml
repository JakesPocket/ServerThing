services:
  arm-bridge:
    extends:
      file: ./compose.base.yaml
      service: arm-bridge
    container_name: arm-bridge
    pull_policy: always
    environment:
      ARM_BRIDGE_MODE: live
      ARM_SETTINGS_PATH: /arm/settings/settings.conf
      ARM_LOGS_DIR: /arm/logs
      ARM_PROGRESS_LOGS_DIR: /arm/logs/progress
      ARM_ARM_LOG_PATH: /arm/logs/arm.log
      ARM_TRANSCODE_LOG_PATH: /arm/logs/transcode.log
      ARM_DB_PATH: /arm/db/arm.db
    volumes:
      - arm_bridge_data:/app/data
      - ${ARM_HOST_SETTINGS_PATH}:/arm/settings/settings.conf:rw
      - ${ARM_HOST_LOGS_PATH}:/arm/logs:ro

  serverthing:
    extends:
      file: ./compose.base.yaml
      service: serverthing
    container_name: serverthing
    pull_policy: always
    volumes:
      - serverthing_data:/app/data

volumes:
  arm_bridge_data:
  serverthing_data:
