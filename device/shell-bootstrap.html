<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no">
    <title>ServerThing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --ui-scale: 1; }
        body { 
            background: #0a0a0a; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 0.5s ease-out;
            transform: scale(var(--ui-scale));
            transform-origin: center;
        }

        .server-icon {
            width: 224px;
            height: 182px;
            margin: 0 auto 22px;
            display: block;
        }

        .rack {
            fill: #141b26;
            stroke: #4a9eff;
            stroke-width: 3;
        }

        .slot {
            fill: #335d90;
        }

        .led {
            opacity: 0.3;
            transform-origin: center;
            animation: ledBlink 1.2s ease-in-out infinite;
        }

        .led.s1 { animation-delay: 0s; }
        .led.s2 { animation-delay: 0.2s; }
        .led.s3 { animation-delay: 0.4s; }
        .led.s4 { animation-delay: 0.6s; }
        .led.s5 { animation-delay: 0.8s; }
        .led.s6 { animation-delay: 1s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes ledBlink {
            0%, 100% { opacity: 0.25; }
            50% { opacity: 1; }
        }

        .app-name {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            color: #fff;
        }

        .status {
            font-size: 24px;
            color: #888;
            margin-top: 8px;
        }

        .version {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #333;
            letter-spacing: 1px;
        }

        .dot-pulse {
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <svg class="server-icon" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect class="rack" x="20" y="15" width="180" height="42" rx="10" />
            <rect class="rack" x="20" y="69" width="180" height="42" rx="10" />
            <rect class="rack" x="20" y="123" width="180" height="42" rx="10" />

            <rect class="slot" x="40" y="33" width="100" height="6" rx="3" />
            <rect class="slot" x="40" y="87" width="100" height="6" rx="3" />
            <rect class="slot" x="40" y="141" width="100" height="6" rx="3" />

            <circle class="led s1" cx="158" cy="36" r="5" fill="#4a9eff" />
            <circle class="led s2" cx="174" cy="36" r="5" fill="#6bb6ff" />
            <circle class="led s3" cx="190" cy="36" r="5" fill="#53d37e" />
            <circle class="led s4" cx="158" cy="90" r="5" fill="#4a9eff" />
            <circle class="led s5" cx="174" cy="90" r="5" fill="#6bb6ff" />
            <circle class="led s6" cx="190" cy="90" r="5" fill="#53d37e" />
            <circle class="led s3" cx="158" cy="144" r="5" fill="#4a9eff" />
            <circle class="led s1" cx="174" cy="144" r="5" fill="#6bb6ff" />
            <circle class="led s5" cx="190" cy="144" r="5" fill="#53d37e" />
        </svg>

        <div class="app-name">ServerThing</div>
        <div class="status" id="status">Connecting<span class="dot-pulse">...</span></div>
    </div>

    <div class="version">v1.0-bootSplash</div>

    <script>
        console.log("ServerThing splash screen loaded");

        // Scale UI for the actual viewport.  Baseline design is 800x480.
        const DESIGN_W = 800;
        const DESIGN_H = 480;
        const applyScale = () => {
            const s = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
            // Clamp to avoid tiny floating rounding differences causing layout jitter.
            const clamped = Math.max(0.5, Math.min(2.0, s));
            document.documentElement.style.setProperty('--ui-scale', clamped.toFixed(4));
        };
        window.addEventListener('resize', applyScale);
        applyScale();
        
        const updateStatus = (msg) => {
            document.getElementById('status').innerHTML = msg + '<span class="dot-pulse">...</span>';
        };

        const defaultConfig = {
            endpoints: [
                'http://127.0.0.1:3000',
                'http://172.16.42.1:3000'
            ],
            shellPath: '/shell/index.html?client=carthing',
            wsProbePath: '/ws/device?id=bootstrap-probe'
        };
        let runtimeConfig = defaultConfig;

        const normalizeConfig = (cfg) => {
            const merged = Object.assign({}, defaultConfig, cfg || {});
            if (!Array.isArray(merged.endpoints) || merged.endpoints.length === 0) {
                merged.endpoints = [...defaultConfig.endpoints];
            }
            merged.endpoints = merged.endpoints
                .map((v) => String(v || '').trim().replace(/\/+$/, ''))
                .filter(Boolean);
            if (merged.endpoints.length === 0) merged.endpoints = [...defaultConfig.endpoints];
            if (typeof merged.shellPath !== 'string' || !merged.shellPath.startsWith('/')) merged.shellPath = defaultConfig.shellPath;
            if (typeof merged.wsProbePath !== 'string' || !merged.wsProbePath.startsWith('/')) merged.wsProbePath = defaultConfig.wsProbePath;
            return merged;
        };

        const loadRuntimeConfig = async () => {
            try {
                const r = await fetch('./clientthing-config.json?t=' + Date.now(), { cache: 'no-store' });
                if (!r.ok) return defaultConfig;
                return normalizeConfig(await r.json());
            } catch (_) {
                return defaultConfig;
            }
        };

        let attempts = 0;
        const maxFastAttempts = 5;

        const tryLaunchShell = () => {
            attempts += 1;
            updateStatus(attempts <= maxFastAttempts ? 'Loading shell' : 'Server unavailable');
            let endpointIdx = 0;

            const tryNextEndpoint = () => {
                if (endpointIdx >= runtimeConfig.endpoints.length) {
                    const delay = attempts <= maxFastAttempts ? 1200 : 3000;
                    setTimeout(tryLaunchShell, delay);
                    return;
                }
                const base = runtimeConfig.endpoints[endpointIdx++];
                const baseTarget = base + runtimeConfig.shellPath;
                const cacheBusterSep = baseTarget.includes('?') ? '&' : '?';
                const target = baseTarget + cacheBusterSep + 't=';
                const wsProbeUrl = base.replace(/^http/i, 'ws') + runtimeConfig.wsProbePath;
                let done = false;
                const ws = new WebSocket(wsProbeUrl + '&t=' + Date.now());
                const complete = (ok) => {
                    if (done) return;
                    done = true;
                    try { ws.close(); } catch (_) {}
                    if (ok) {
                        window.location.replace(target + Date.now());
                    } else {
                        tryNextEndpoint();
                    }
                };
                ws.onopen = () => complete(true);
                ws.onerror = () => complete(false);
                setTimeout(() => complete(false), 900);
            };

            tryNextEndpoint();
        };

        // Startup sequence with runtime-config and retry loop.
        const start = async () => {
            runtimeConfig = await loadRuntimeConfig();
            setTimeout(() => updateStatus('Establishing tunnel'), 500);
            setTimeout(tryLaunchShell, 1200);
        };
        start();
    </script>
</body>
</html>
