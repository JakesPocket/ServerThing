services:
  serverthing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serverthing
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.dockserver
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Keep this path aligned with the mounted SSH key below.
    volumes:
      # Persist discovered device data and server state.
      - ./data:/app/data
      # Read-only SSH key used for remote MakeMKV host commands.
