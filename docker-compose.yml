services:
  serverthing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serverthing
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.dockserver
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # Persist discovered device data and server state.
      - ./data:/app/data
      # Optional legacy SSH key mount (only needed when MAKEMKV_API_BASE_URL is unset):
      # - /opt/serverthing/.ssh/serverthing_makemkv:/run/keys/serverthing_makemkv:ro
