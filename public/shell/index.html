<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ServerThing Shell</title>
  <!-- Material Symbols for app glyphs (local copy for offline / firewall environments) -->
  <link rel="stylesheet" href="/shell/fonts/material-symbols.css">
  <link rel="stylesheet" href="/shell/shell.css">
</head>
<body>
  <!-- System UI Shell - Never reloads, permanent runtime -->
  <div id="shell-container">
    <!-- Status Bar -->
    <div id="status-bar">
      <div class="status-bar-left">
        <button id="sys-nav-button" class="hidden" aria-label="Navigation">
          <span class="material-symbols-outlined">arrow_back_ios_new</span>
        </button>
      </div>
      <div class="status-bar-center">
        <span id="status-time">--:--</span>
      </div>
      <div class="status-bar-right">
        <button id="sys-settings-button" class="status-icon-button" aria-label="Settings">
          <span class="material-symbols-outlined">settings</span>
        </button>
        <span id="status-connection">●</span>
      </div>
    </div>

    <!-- App Container - Full screen apps render here -->
    <div id="app-viewport">
      <!-- Home Screen / Launcher -->
      <div id="home-screen" class="screen active">
        <div id="app-grid"></div>
        <p class="hint">Turn dial to select • Click to open</p>
      </div>

      <!-- App iframes load here -->
      <div id="app-container" class="screen"></div>
    </div>

    <!-- Navigation overlay (shown on back button) -->
    <div id="nav-overlay" class="hidden">
      <div class="nav-menu">
        <div class="nav-item selected" data-action="current-app">
          <span class="nav-icon">↻</span>
          <span class="nav-label">Continue</span>
        </div>
        <div class="nav-item" data-action="home">
          <span class="nav-icon">⌂</span>
          <span class="nav-label">Home</span>
        </div>
        <div class="nav-item" data-action="close-app">
          <span class="nav-icon">✕</span>
          <span class="nav-label">Close App</span>
        </div>
      </div>
      <p class="hint">Turn dial to select • Click to choose</p>
    </div>

    <!-- System Settings Overlay -->
    <div id="settings-overlay" class="hidden">
      <div class="settings-panel">
        <div class="settings-header">
          <h3>System Settings</h3>
          <button id="close-settings" class="close-btn">
            <svg class="shell-icon" viewBox="0 -960 960 960"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
          </button>
        </div>
        <div class="settings-content">
          <div class="setting-item">
            <label>Brightness <span id="brightness-value" class="setting-value">128</span></label>
            <div class="slider-container">
              <svg class="shell-icon sm" viewBox="0 -960 960 960"><path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-101 57-57 101 101-57 57Zm546-101-101 101-57-57 101-101 57 57ZM212-212l101-101 57 57-101 101-57-57Zm546 101-101-101 57-57 101 101-57 57ZM480-480Z"/></svg>
              <input type="range" id="brightness-slider" min="1" max="255" step="5" value="128">
            </div>
          </div>
          <div class="setting-item">
            <label>Auto-Dim</label>
            <div class="toggle-container">
              <input type="checkbox" id="auto-dim-toggle">
            </div>
          </div>
          <div class="setting-item">
            <label>Microphone</label>
            <div class="toggle-container">
              <input type="checkbox" id="mic-toggle">
            </div>
          </div>
          <div class="setting-item diagnostics">
            <label>Input Bridge Health</label>
            <div class="diagnostics-grid">
              <div class="diag-row"><span>Server Link</span><span id="diag-server-link">--</span></div>
              <div class="diag-row"><span>Queue</span><span id="diag-queue-size">--</span></div>
              <div class="diag-row"><span>Failures</span><span id="diag-send-failures">--</span></div>
              <div class="diag-row"><span>Monitors</span><span id="diag-monitor-count">--</span></div>
              <div class="diag-row"><span>Last Update</span><span id="diag-last-update">--</span></div>
            </div>
          </div>
        </div>

        <div class="settings-actions">
          <button id="repair-clientthing" class="settings-action-btn" type="button">
            <span class="material-symbols-outlined">build</span>
            <span>Repair ClientThing</span>
          </button>
          <button id="restart-chromium" class="settings-action-btn" type="button">
            <span class="material-symbols-outlined">refresh</span>
            <span>Restart Chromium</span>
          </button>
          <button id="reboot-device" class="settings-action-btn danger" type="button">
            <span class="material-symbols-outlined">restart_alt</span>
            <span>Reboot</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>

    <!-- Full-screen disconnect overlay (shown when shell loses WS connection) -->
    <div id="disconnect-screen" class="hidden">
      <div class="disconnect-content">
        <svg class="client-icon" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect class="device-outline" x="16" y="36" width="132" height="72" rx="12" />
          <rect class="device-screen" x="34" y="66" width="84" height="5" rx="2.5" />
          <rect class="device-outline device-tablet" x="118" y="54" width="70" height="96" rx="10" />
          <rect class="device-screen" x="132" y="96" width="42" height="4.5" rx="2.25" />
          <rect class="device-outline device-phone" x="158" y="42" width="44" height="92" rx="9" />
          <rect class="device-screen" x="167" y="76" width="25" height="4" rx="2" />

          <circle class="device-led l1" cx="130" cy="130" r="4.5" />
          <circle class="device-led l2" cx="146" cy="130" r="4.5" />
          <circle class="device-led l3" cx="162" cy="130" r="4.5" />
        </svg>
        <h2>ClientThing</h2>
        <p class="disconnect-title">Connection lost</p>
        <p class="disconnect-status">Attempting to reconnect<span class="dot-pulse">...</span></p>
      </div>
    </div>
  </div>

  <script src="/shell/shell_v3.js" type="module"></script>
</body>
</html>
